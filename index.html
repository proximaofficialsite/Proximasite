<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Proxima Store | Premium Selection</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2874f0;
      --fk-orange: #fb641b;
      --fk-yellow: #ff9f00;
      --bg: #f1f3f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: #212121; overflow-x: hidden; font-size: 14px; }

    /* Secure Overlay */
    #accessOverlay {
      position: fixed; inset: 0; background: #fff; z-index: 10000;
      display: none; align-items: center; justify-content: center;
    }

    /* Header */
    header {
      background: var(--primary); padding: 8px 4%; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
    .logo-box { color: white; text-decoration: none; cursor: pointer; min-width: 80px; }
    .logo-main { font-size: 18px; font-weight: 800; font-style: italic; display: block; }
    .logo-sub { font-size: 9px; color: #ffe500; font-weight: 700; margin-top: -3px; }

    .search-wrapper { flex-grow: 1; position: relative; max-width: 300px; }
    .search-wrapper input { width: 100%; padding: 7px 30px; border: none; border-radius: 6px; outline: none; font-size: 12px; }
    .search-wrapper i { position: absolute; left: 8px; top: 9px; color: #888; font-size: 12px; }

    /* Profile Dropdown Logic */
    .user-profile-section { position: relative; margin-left: 10px; }
    .avatar-circle {
      width: 34px; height: 34px; border-radius: 50%; background: #ffe500; color: var(--primary);
      display: flex; align-items: center; justify-content: center; font-weight: 800;
      cursor: pointer; border: 2px solid white; overflow: hidden; font-size: 16px; position: relative;
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

    .profile-dropdown {
      position: absolute; right: 0; top: 45px; background: white; width: 180px;
      border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      display: none; flex-direction: column; padding: 10px; z-index: 1001;
      border: 1px solid #eee;
    }
    .profile-dropdown.active { display: flex; }
    .user-info-detail { text-align: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .user-email { font-size: 10px; color: #666; overflow: hidden; text-overflow: ellipsis; }
    
    .dropdown-btn {
      width: 100%; padding: 8px; border: none; background: none; text-align: left;
      font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
      border-radius: 5px; color: #444;
    }
    .dropdown-btn:hover { background: #f0f0f0; }
    .logout-text { color: var(--fk-orange); border-top: 1px solid #f9f9f9; margin-top: 5px; }

    /* Categories Bar */
    .fk-categories { background: white; display: flex; justify-content: space-around; padding: 10px 0; margin-bottom: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .fk-cat-item { text-align: center; cursor: pointer; }
    .fk-cat-item i { font-size: 18px; color: var(--primary); margin-bottom: 2px; display: block; }
    .fk-cat-item p { font-size: 10px; font-weight: 600; color: #444; }

    /* COMPACT ITEM BOXES */
    .main-container { padding: 0 6px; max-width: 1200px; margin: 0 auto; }
    .section-card { background: white; padding: 10px 8px; border-radius: 4px; margin-bottom: 8px; }
    .section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; }

    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .item-box { border: 1px solid #f0f0f0; border-radius: 6px; padding: 8px; background: #fff; display: flex; flex-direction: column; align-items: center; }
    .img-box { width: 100%; height: 90px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
    .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .item-title { font-size: 11px; font-weight: 700; text-align: center; height: 28px; overflow: hidden; margin-bottom: 6px; color: #333; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .item-price { font-size: 12px; color: #388e3c; font-weight: 800; margin-bottom: 6px; }

    .btn-action { width: 100%; border: none; padding: 7px 0; font-size: 10px; font-weight: 800; border-radius: 4px; text-align: center; text-transform: uppercase; cursor: pointer; text-decoration: none; display: block; }
    .btn-free { background: var(--fk-orange); color: white; }
    .btn-buy { background: var(--fk-yellow); color: white; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-card { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; }
    input[type="email"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; outline: none; }
    
    #fileInput { display: none; }
  </style>
</head>
<body>

<div id="accessOverlay">
  <div class="modal-card">
    <h2 style="color:var(--primary); margin-bottom:15px;">Proxima Store</h2>
    <input type="password" id="accessKeyInput" placeholder="Enter Access Key" style="text-align:center;">
    <button onclick="verifyAccess()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; font-weight:800; border-radius:6px;">UNLOCK</button>
  </div>
</div>

<header>
  <div class="header-left">
      <div class="logo-box" onclick="location.reload()">
        <span class="logo-main">Proxima</span>
        <span class="logo-sub">Store Plus <i class="fa fa-plus"></i></span>
      </div>
      <div class="search-wrapper">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterHacks()">
      </div>
  </div>

  <div class="user-profile-section">
      <div class="avatar-circle" id="userAvatar" onclick="toggleDropdown(event)">?</div>
      
      <div class="profile-dropdown" id="profileDropdown">
          <div class="user-info-detail">
              <strong id="displayInitial">User</strong>
              <p class="user-email" id="userEmailDisplay">Loading...</p>
          </div>
          <button class="dropdown-btn" onclick="triggerFileUpload()">
              <i class="fa fa-image"></i> Change Photo
          </button>
          <button class="dropdown-btn logout-text" onclick="handleLogout()">
              <i class="fa fa-sign-out-alt"></i> Logout Account
          </button>
      </div>
  </div>
</header>

<input type="file" id="fileInput" accept="image/*" onchange="uploadProfilePic(this)">

<div class="fk-categories">
    <div class="fk-cat-item" onclick="showView('dashboardView')"><i class="fa fa-bolt"></i><p>Trending</p></div>
    <div class="fk-cat-item" onclick="showView('cloudView')"><i class="fa fa-gift"></i><p>Free</p></div>
    <div class="fk-cat-item" onclick="showView('proView')"><i class="fa fa-crown"></i><p>Pro</p></div>
    <div class="fk-cat-item"><i class="fa fa-shield"></i><p>Anti-Ban</p></div>
</div>

<div class="main-container">
    <div id="dashboardView" class="section-card">
        <div class="section-title">Latest Mods</div>
        <div id="mainContent" class="product-grid"></div>
    </div>
    <div id="cloudView" class="section-card" style="display:none;"><div class="section-title">Free Mods</div><div id="cloudContent" class="product-grid"></div></div>
    <div id="proView" class="section-card" style="display:none;"><div class="section-title">Pro Premium</div><div id="proContent" class="product-grid"></div></div>
</div>

<div class="modal-overlay" id="authModal">
  <div class="modal-card">
    <h3 style="margin-bottom:15px;">Member Login</h3>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="authAction()" style="width:100%; padding:12px; background:var(--fk-orange); color:white; border:none; font-weight:800; border-radius:6px;">CONTINUE</button>
  </div>
</div>

<div class="modal-overlay" id="paymentModal">
    <div class="modal-card">
      <h3 style="margin-bottom:10px;">Merchant Payment</h3>
      <img id="qrImage" style="width:180px; height:180px; margin-bottom:10px; border:1px solid #eee;">
      <p style="font-size:12px;">Contact for Key: <br><strong>+91 9395874180</strong></p>
      <button onclick="closePay()" style="width:100%; margin-top:15px; padding:8px; border:none; background:#f5f5f5; border-radius:4px;">CLOSE</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBDqPwPYSXIW3ArvM192Jh9XiLuhdWLD6s",
  authDomain: "proxima-site-72048.firebaseapp.com",
  databaseURL: "https://proxima-site-72048-default-rtdb.firebaseio.com",
  projectId: "proxima-site-72048",
  storageBucket: "proxima-site-72048.firebasestorage.app",
  messagingSenderId: "839252547982",
  appId: "1:839252547982:web:fb6a46a428ab87304a2cdf"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.database();

// --- AUTH & PROFILE ---
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('accessOverlay').style.display = 'none';
    document.getElementById('authModal').style.display = 'none';
    updateProfileUI(user);
  } else {
    document.getElementById('accessOverlay').style.display = 'flex';
  }
});

function updateProfileUI(user) {
  const initial = user.email.charAt(0).toUpperCase();
  document.getElementById('userEmailDisplay').innerText = user.email;
  document.getElementById('displayInitial').innerText = initial;
  
  db.ref('users/' + user.uid + '/profilePic').on('value', s => {
    if(s.exists()) {
      document.getElementById('userAvatar').innerHTML = `<img src="${s.val()}">`;
    } else {
      document.getElementById('userAvatar').innerText = initial;
    }
  });
}

function verifyAccess() {
  const key = document.getElementById('accessKeyInput').value;
  db.ref('appSettings/userPassword').once('value', s => {
    if(key == s.val()) {
        document.getElementById('accessOverlay').style.display = 'none';
        if(!auth.currentUser) document.getElementById('authModal').style.display = 'flex';
    } else { alert("Invalid Key!"); }
  });
}

function authAction() {
  const e=document.getElementById('email').value, p=document.getElementById('pass').value;
  if(!e || !p) return alert("Required!");
  auth.createUserWithEmailAndPassword(e,p).catch(()=>auth.signInWithEmailAndPassword(e,p));
}

function handleLogout() {
  if(confirm("Logout from Proxima?")) {
      auth.signOut().then(() => location.reload());
  }
}

// --- DROPDOWN LOGIC ---
function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('profileDropdown').classList.toggle('active');
}

// Close when clicking anywhere else
document.addEventListener('click', function() {
    document.getElementById('profileDropdown').classList.remove('active');
});

function triggerFileUpload() { document.getElementById('fileInput').click(); }

function uploadProfilePic(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    db.ref('users/' + auth.currentUser.uid).update({ profilePic: e.target.result })
      .then(() => alert("Profile Photo Saved!"));
  };
  reader.readAsDataURL(file);
}

// --- CORE FUNCTIONS ---
function showView(id){
    ['dashboardView','cloudView','proView'].forEach(v=>document.getElementById(v).style.display='none');
    document.getElementById(id).style.display='block';
}
function openPay(){document.getElementById('paymentModal').style.display='flex'}
function closePay(){document.getElementById('paymentModal').style.display='none'}

db.ref('downloads').on('value',s=>{
  const main=document.getElementById('mainContent'), cloud=document.getElementById('cloudContent'), pro=document.getElementById('proContent');
  main.innerHTML=''; cloud.innerHTML=''; pro.innerHTML='';
  if(!s.exists()) return;
  Object.values(s.val()).reverse().forEach(i=>{
    const title = i.title || "Mod";
    const freeHtml = `<div class="item-box"><div class="img-box"><img src="${i.thumbnail}"></div><div class="item-title">${title}</div><div class="item-price">FREE</div><a href="${i.link1}" class="btn-action btn-free">Download</a></div>`;
    const proHtml = `<div class="item-box"><div class="img-box"><img src="${i.thumbnail}"></div><div class="item-title">${title}</div><div class="item-price">PRO</div><button onclick="openPay()" class="btn-action btn-buy">Unlock</button></div>`;
    main.innerHTML += freeHtml; cloud.innerHTML += freeHtml; pro.innerHTML += proHtml;
  });
});

db.ref('appSettings/paymentScanner').on('value',s=>document.getElementById('qrImage').src=s.exists()?s.val():'');

function filterHacks() {
  const input = document.getElementById('searchInput').value.toLowerCase();
  const cards = document.getElementsByClassName('item-box');
  for (let i = 0; i < cards.length; i++) {
    const title = cards[i].querySelector('.item-title').innerText.toLowerCase();
    cards[i].style.display = title.includes(input) ? "" : "none";
  }
}
</script>
</body>
</html>
